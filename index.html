function sortRows(){courses.sort((a,b)=>(a[1]+a[2]+a[3]).localeCompare(b[1]+b[2]+b[3],'ko'))}
function render(){sortRows();let html='<tr class="header"><th class="no-head sticky-no" style="width:46px">No.</th>';headers.forEach((h,i)=>html+=`<th class="${i>=feeStart?'fee-head':''} ${i==1?'sticky-major':''} ${i==2?'sticky-sub':''} ${i==5?'sticky-teacher':''}" style="width:${widths[i]}px">${h}</th>`);html+='<th class="detail-head">.</th></tr>';courses.forEach((r,ri)=>{html+=`<tr><td class="no-cell sticky-no">${ri+1}</td>`;headers.forEach((h,ci)=>{let cls=(ci==1?'sticky-major major-bg ':ci==2?'sticky-sub ':ci==5?'sticky-teacher ':'')+(ci==1&&r[1]=='ACT'?'act-bg ':'')+(ci==4?'muted-bg ':'')+(ci>=feeStart?'num ':'');html+=`<td contenteditable="true" data-r="${ri}" data-c="${ci}" class="cell ${cls}" style="width:${widths[ci]}px">${esc(r[ci]||'')}</td>`});html+=`<td class="detail-col"><button class="detail-btn" data-detail="${ri}">수업상세정보</button></td></tr>`});sheet.innerHTML=html;bindCells();updateOutline()}

function bindCells(){document.querySelectorAll('.cell').forEach(td=>{td.onfocus=()=>selectCell(+td.dataset.r,+td.dataset.c);td.onmousedown=e=>{drag=true;selectCell(+td.dataset.r,+td.dataset.c);e.preventDefault()};td.onmouseenter=()=>{if(drag)extend(+td.dataset.r,+td.dataset.c)};td.oninput=()=>{pushUndo();courses[+td.dataset.r][+td.dataset.c]=td.textContent}});document.querySelectorAll('[data-detail]').forEach(b=>b.onclick=()=>openDetail(+b.dataset.detail))}
function range(){if(!sel)return null;let r1=Math.min(sel.sr,sel.er),r2=Math.max(sel.sr,sel.er),c1=Math.min(sel.sc,sel.ec),c2=Math.max(sel.sc,sel.ec);return{r1,r2,c1,c2}}
function selectCell(r,c){sel={sr:r,sc:c,er:r,ec:c};paint()}
function extend(r,c){if(!sel)return;sel.er=r;sel.ec=c;paint()}

function cell(r,c){return document.querySelector(`[data-r="${r}"][data-c="${c}"]`)}
function updateOutline(){let g=range();if(!g){outline.style.display=handle.style.display='none';return}let a=cell(g.r1,g.c1),b=cell(g.r2,g.c2);if(!a||!b)return;let ar=a.getBoundingClientRect(),br=b.getBoundingClientRect();outline.style.display='block';outline.style.left=ar.left+'px';outline.style.top=ar.top+'px';outline.style.width=(br.right-ar.left)+'px';outline.style.height=(br.bottom-ar.top)+'px';handle.style.display='flex';handle.style.left=(br.right-9)+'px';handle.style.top=(br.bottom-9)+'px'}
function pushUndo(){undo.push(JSON.stringify(courses));if(undo.length>50)undo.shift()}
function applyRows(){render()}
document.addEventListener('mouseup',()=>{drag=false;if(fill)fill=false});document.addEventListener('scroll',updateOutline,true);window.addEventListener('resize',updateOutline);handle.onmousedown=e=>{fill=true;e.preventDefault()};document.addEventListener('mousemove',e=>{if(!fill||!sel)return;let g=range();let target=document.elementFromPoint(e.clientX,e.clientY)?.closest('.cell');if(!target)return;let tr=+target.dataset.r;if(tr>g.r2){pushUndo();let block=courses.slice(g.r1,g.r2+1).map(r=>r.slice(g.c1,g.c2+1));for(let r=g.r2+1;r<=tr;r++){for(let c=g.c1;c<=g.c2;c++)courses[r][c]=block[(r-g.r2-1)%block.length][c-g.c1]}sel.er=tr;applyRows()}});
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='z'){e.preventDefault();let prev=undo.pop();if(prev){courses=JSON.parse(prev);render()}}if((e.key==='Delete'||e.key==='Backspace')&&sel){e.preventDefault();pushUndo();let g=range();for(let r=g.r1;r<=g.r2;r++)for(let c=g.c1;c<=g.c2;c++)courses[r][c]='';render()}if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='c'&&sel){let g=range(),rows=[];for(let r=g.r1;r<=g.r2;r++){let row=[];for(let c=g.c1;c<=g.c2;c++)row.push(courses[r][c]||'');rows.push(row.join('\t'))}navigator.clipboard.writeText(rows.join('\n'));toast('복사되었습니다')}});
document.addEventListener('paste',e=>{if(!sel)return;let text=e.clipboardData.getData('text/plain');if(!text)return;e.preventDefault();pushUndo();text.split(/\r?\n/).filter(Boolean).forEach((line,ri)=>line.split('\t').forEach((v,ci)=>{let r=sel.sr+ri,c=sel.sc+ci;if(courses[r]&&c<headers.length)courses[r][c]=v}));render()});
function openDetail(i){let r=courses[i];let total=r[25]||r[30]||'';let time=r[10]||'';document.getElementById('detailContent').innerHTML=`<div class="detail-hero"><span class="badge">${esc(r[1])}-${esc(r[2])}</span><div class="available">수강가능</div><h2>${esc(r[3])}</h2><div class="level">권장 학년: ${esc(r[6]||'9-10th')}</div></div><div class="detail-body"><h3 class="section-title">수업 개요</h3><div class="summary-box">${esc(r[17]||'수업 정보를 확인하세요.')}</div><div class="grid"><div><h3 class="section-title">수업 정보</h3><div class="info-row"><span>수업 방식</span><strong>${esc(r[13])}</strong></div><div class="info-row"><span>수업 시간</span><strong>${esc(time)}</strong></div><div class="info-row"><span>총 회차</span><strong>${esc(r[12])}</strong></div><div class="info-row"><span>정원</span><strong>최대 ${esc(r[14])}</strong></div></div><div><h3 class="section-title">학습 목표</h3><ul class="goals"><li>핵심 개념과 원리의 완벽한 이해</li><li>다양한 문제 유형에 대한 적응력 배양</li><li>시험 대비 전략 수립 및 실전 연습</li><li>자기주도 학습 능력 향상</li></ul></div></div><h3 class="section-title" style="margin-top:28px">학습 경로</h3><div class="path"><div><div style="color:#6b7280;margin-bottom:10px">현재 과목</div><div class="current">${esc(r[3])}</div></div><div><div style="color:#6b7280;margin-bottom:10px">후속과목</div><div class="next">AP ${esc(r[2]||'Course')} 1</div></div></div><button class="copy-btn" onclick="copyTemplate('${esc(r[3])}','${esc(total)}','${esc(time)}')">안내 문구 템플릿 복사</button></div>`;document.getElementById('detailBack').classList.add('open')}
window.copyTemplate=(name,total,time)=>{navigator.clipboard.writeText(`${name} 안내드립니다. 수업료는 ${total}원 이고, 시간은 ${time} 입니다.`);toast('복사되었습니다')};
function toast(t){let el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1600)}
document.getElementById('closeDetail').onclick=()=>document.getElementById('detailBack').classList.remove('open');document.getElementById('detailBack').onclick=e=>{if(e.target.id==='detailBack')e.currentTarget.classList.remove('open')};
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function last(t){document.getElementById('lastUpdated').textContent='last updated '+(t||'9999.99.99 99:99:99');if(t)localStorage.setItem('classLastUpdated',t)}
function cfg(){return{url:(localStorage.supabaseUrl||'').replace(/\/+$/,''),key:localStorage.supabaseKey||'',table:localStorage.supabaseTable||'course_sheets',sheet:localStorage.sheetId||'2026-summer'}}
function fillCfg(){let c=cfg();supabaseUrl.value=c.url;supabaseKey.value=c.key;supabaseTable.value=c.table;sheetId.value=c.sheet}
function updateStatus(){let c=cfg();serverStatus.textContent=c.url&&c.key?'상태: 서버 설정됨':'상태: 서버 미설정'}
function pass(fn){let p=prompt('비밀번호를 입력해주세요.');if(p===password)fn();else if(p!==null)toast('비밀번호가 맞지 않습니다')}
serverSettingsBtn.onclick=()=>pass(()=>{fillCfg();settingsBack.classList.add('open')});serverLoadBtn.onclick=()=>pass(loadServer);closeSettings.onclick=()=>settingsBack.classList.remove('open');settingsBack.onclick=e=>{if(e.target.id==='settingsBack')settingsBack.classList.remove('open')};
saveSettingsBtn.onclick=()=>{localStorage.supabaseUrl=supabaseUrl.value.trim();localStorage.supabaseKey=supabaseKey.value.trim();localStorage.supabaseTable=supabaseTable.value.trim()||'course_sheets';localStorage.sheetId=sheetId.value.trim()||'2026-summer';updateStatus();settingsBack.classList.remove('open');toast('설정 저장 완료')};
const sql=`create table if not exists course_sheets (sheet_id text primary key,data jsonb not null,updated_at timestamptz default now()); alter table course_sheets enable row level security; create policy "anon upsert" on course_sheets for all using (true) with check (true);`;
copySqlBtn.onclick=()=>{navigator.clipboard.writeText(sql);toast('SQL이 복사되었습니다')};
async function saveServer(){let c=cfg();if(!c.url||!c.key){toast('서버 설정이 필요합니다');return}let msg=fmt(new Date())+' 변경된 내용을 저장 하시겠습니까?';if(!confirm(msg))return;let payload={sheet_id:c.sheet,data:{headers,courses,term:termSelect.value,updatedAt:new Date().toISOString()},updated_at:new Date().toISOString()};try{serverStatus.textContent='상태: 서버 저장 중...';let res=await fetch(`${c.url}/rest/v1/${c.table}`,{method:'POST',headers:{apikey:c.key,Authorization:'Bearer '+c.key,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(payload)});if(!res.ok)throw new Error(await res.text());saved=JSON.stringify(courses);let t=fmt(new Date());last(t);serverStatus.textContent='상태: 서버 저장 완료';toast('서버에 저장되었습니다')}catch(e){serverStatus.textContent='상태: 저장 실패';toast('저장 실패: 테이블명 또는 Supabase URL을 확인해주세요')}}
async function loadServer(){let c=cfg();if(!c.url||!c.key){toast('서버 설정이 필요합니다');return}try{serverStatus.textContent='상태: 서버 불러오는 중...';let res=await fetch(`${c.url}/rest/v1/${c.table}?sheet_id=eq.${encodeURIComponent(c.sheet)}&select=data&limit=1`,{headers:{apikey:c.key,Authorization:'Bearer '+c.key}});if(!res.ok)throw new Error(await res.text());let rows=await res.json();if(!rows.length){toast('저장된 서버 데이터가 없습니다');serverStatus.textContent='상태: 서버 데이터 없음';return}courses=(rows[0].data.courses||courses).map(r=>headers.map((_,i)=>r[i]||''));saved=JSON.stringify(courses);render();serverStatus.textContent='상태: 서버 불러오기 완료';toast('서버 데이터를 불러왔습니다')}catch(e){serverStatus.textContent='상태: 불러오기 실패';toast('불러오기 실패: 서버 설정을 확인해주세요')}}
saveBtn.onclick=saveServer;cancelBtn.onclick=()=>{courses=JSON.parse(saved);render();toast('변경을 취소했습니다')};
downloadBtn.onclick=()=>{let rows=[['No.',...headers],...courses.map((r,i)=>[i+1,...r])];let html='<table>'+rows.map(r=>'<tr>'+r.map(c=>'<td>'+esc(c)+'</td>').join('')+'</tr>').join('')+'</table>';let blob=new Blob(['\ufeff'+html],{type:'application/vnd.ms-excel;charset=utf-8'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='전체수업정보-'+new Date().toISOString().slice(0,10)+'.xls';a.click();URL.revokeObjectURL(a.href)};
uploadBtn.onclick=()=>fileInput.click();fileInput.onchange=e=>{let f=e.target.files[0];if(!f)return;let reader=new FileReader();reader.onload=()=>{pushUndo();let text=String(reader.result||'');let rows=text.split(/\r?\n/).filter(Boolean).map(l=>l.includes('\t')?l.split('\t'):l.split(','));if(rows[0]&&rows[0][0]==='No.')rows.shift();courses=rows.map(r=>headers.map((_,i)=>String(r[i+1]??r[i]??'').trim())).filter(r=>r[1]||r[3]);saved=JSON.stringify(courses);render();toast('업로드되었습니다')};reader.readAsText(f,'UTF-8');e.target.value=''};
last(localStorage.getItem('classLastUpdated'));updateStatus();render();
</script>
</body>
</html>
